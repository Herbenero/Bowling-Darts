<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bowling Darts - Enhanced</title>
<style>
  :root {
    --bg: #0a0f19;
    --panel: #121a24;
    --text: #e0e6f0;
    --muted: #7a8ba6;
    --accent: #00d1ff;
    --warn: #ff6b6b;
    --radius: 14px;
  }
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  h1 {
    margin: 0;
    font-weight: 700;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--text);
    padding: 8px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s ease;
  }
  .btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .btn-primary:hover {
    background: #00b0e6;
    border-color: #00b0e6;
  }
  .btn-warn {
    background: var(--warn);
    border-color: var(--warn);
    color: #000;
  }
  .btn-warn:hover {
    background: #e04e4e;
    border-color: #e04e4e;
  }
  .setup, .game {
    background: var(--panel);
    padding: 20px;
    border-radius: var(--radius);
  }
  .players-list {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }
  .players-list input {
    flex: 1;
    padding: 8px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text);
  }
  .players-list button {
    flex-shrink: 0;
  }
  .meta {
    display: flex;
    gap: 20px;
    margin-top: 15px;
  }
  .meta div {
    flex: 1;
    background: rgba(255 255 255 / 0.05);
    padding: 10px;
    border-radius: var(--radius);
    text-align: center;
  }
  .meta div span {
    display: block;
  }
  .meta .label {
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 5px;
  }
  .meta .value {
    font-weight: 700;
    font-size: 1.3rem;
  }
  .controls {
    margin-top: 15px;
    display: flex;
    gap: 10px;
  }
  .shot-buttons {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .shot-button {
    background: rgba(0, 209, 255, 0.15);
    border: 1px solid rgba(0, 209, 255, 0.3);
    border-radius: var(--radius);
    padding: 15px 0;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    user-select: none;
    transition: background 0.3s ease;
  }
  .shot-button:hover:not(:disabled) {
    background: var(--accent);
    color: #000;
  }
  .shot-button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .keypad {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .key {
    background: #001f2f;
    border: 1px solid #00d1ff;
    border-radius: var(--radius);
    padding: 15px 0;
    font-weight: 700;
    color: #00d1ff;
    cursor: pointer;
    user-select: none;
    transition: background 0.3s ease;
  }
  .key.bull {
    background: #4a3e00;
    border-color: #ffd166;
    color: #ffd166;
  }
  .key:hover:not(.disabled) {
    background: #00d1ff;
    color: #000;
  }
  .key.disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
  }
  th, td {
    border: 1px solid var(--line);
    padding: 8px;
    text-align: center;
    color: var(--text);
  }
  th {
    background: rgba(0, 209, 255, 0.1);
    font-weight: 700;
  }
  td.name {
    text-align: left;
    font-weight: 700;
  }
  td.total {
    font-weight: 900;
    color: var(--gold);
  }
  .frame-cell {
    min-width: 90px;
  }
  .frame-top {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .throws {
    display: flex;
    justify-content: center;
    gap: 6px;
    font-weight: 700;
  }
  .throw {
    min-width: 20px;
    padding: 4px 6px;
    border-radius: 6px;
    background: rgba(0, 209, 255, 0.1);
  }
  .active-row {
    outline: 2px solid rgba(0, 209, 255, 0.3);
    background: rgba(0, 209, 255, 0.1);
  }
  .announce {
    margin-top: 15px;
    padding: 12px;
    border-radius: var(--radius);
    background: rgba(0, 209, 255, 0.05);
    font-weight: 700;
  }
  .export-import {
    margin-top: 15px;
    display: flex;
    gap: 10px;
  }
  input[type="file"] {
    display: none;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bowling Darts</h1>
      <p class="lead">Select alley with dart 1, score with darts 2 & 3. Frame totals capped at 10.</p>
      <div class="export-import">
        <button id="exportHistoryBtn" class="btn">Export History</button>
        <button id="importHistoryBtn" class="btn">Import History</button>
        <input type="file" id="importFile" accept="application/json" />
      </div>
    </header>

    <section class="setup panel">
      <div class="players-list" id="playersList">
        <div class="player-row">
          <input type="text" value="Player 1" />
        </div>
        <div class="player-row">
          <input type="text" value="Player 2" />
        </div>
      </div>
      <div class="row" style="margin-top:10px;">
        <button id="addPlayerBtn" class="btn">Add Player</button>
        <button id="removePlayerBtn" class="btn">Remove Player</button>
        <button id="startBtn" class="btn-primary" style="margin-left:auto;">Start Game</button>
      </div>
    </section>

    <section class="game panel" style="display:none;">
      <div class="meta">
        <div class="card"><span class="label">Current Player</span><span id="currentPlayer" class="value">—</span></div>
        <div class="card"><span class="label">Frame</span><span id="frameLabel" class="value">—</span></div>
        <div class="card"><span class="label">Dart</span><span id="dartLabel" class="value">—</span></div>
        <div class="card"><span class="label">Mode</span><span id="modeLabel" class="value">Bowling Darts</span></div>
        <div class="card"><span class="label">Alley</span><span id="alleyLabel" class="value">—</span></div>
      </div>

      <div class="shot-buttons" id="shotButtons">
        <button class="shot-button" data-shot="Miss">Miss</button>
        <button class="shot-button" data-shot="Outer Single">Outer</button>
        <button class="shot-button" data-shot="Inner Single">Inner</button>
        <button class="shot-button" data-shot="Triple">Triple</button>
        <button class="shot-button" data-shot="Double">Double</button>
      </div>

      <div class="keypad" id="keypad"></div>

      <div class="controls" style="margin-top:15px;">
        <button id="undoBtn" class="btn">Undo</button>
        <button id="endTurnBtn" class="btn-primary">End Turn</button>
        <button id="newGameBtn" class="btn-warn">New Game</button>
      </div>

      <div class="announce" id="announcement">Enter player names and start the game.</div>
    </section>

    <section class="panel" style="margin-top:20px;">
      <h2>Scoreboard</h2>
      <div class="table-wrap">
        <table>
          <thead id="scoreHead"></thead>
          <tbody id="scoreBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel" style="margin-top:20px;">
      <h2>Match History</h2>
      <div id="historyList" style="color: var(--muted); max-height: 300px; overflow-y: auto;"></div>
    </section>

    <section class="panel" style="margin-top:20px;">
      <h2>Leaderboard</h2>
      <div id="leaderList" style="color: var(--muted); max-height: 300px; overflow-y: auto;"></div>
    </section>
  </div>

<script>
  const STORAGE_HISTORY = 'bowlingDarts_history_v2';
  const STORAGE_LEADER = 'bowlingDarts_leader_v2';

  const alleyMap = {
    1:'Miss',2:'Triple',3:'Outer Single',4:'Double',5:'Inner Single',
    6:'Miss',7:'Triple',8:'Outer Single',9:'Double',10:'Inner Single',
    11:'Miss',12:'Triple',13:'Outer Single',14:'Double',15:'Inner Single',
    16:'Miss',17:'Triple',18:'Outer Single',19:'Double',20:'Inner Single'
  };
  const pointsMap = { 'Miss':0, 'Triple':9, 'Outer Single':3, 'Double':10, 'Inner Single':7 };
  const throwSymbol = s => {
    if (!s) return '';
    if (s === 'Miss') return '-';
    if (s === 'Double') return 'X';
    if (s === 'Triple') return 'T';
    if (s === 'Outer Single') return 'O';
    if (s === 'Inner Single') return 'I';
    return '';
  };

  let players = [];
  let totals = [];
  let frameScores = [];
  let roundScores = [];
  let currentPlayer = 0;
  let frameIndex = 0;
  let dart = 1;
  let started = false;
  let historyStack = [];

  const els = {
    playersList: document.getElementById('playersList'),
    addPlayerBtn: document.getElementById('addPlayerBtn'),
    removePlayerBtn: document.getElementById('removePlayerBtn'),
    startBtn: document.getElementById('startBtn'),
    shotButtons: document.getElementById('shotButtons'),
    keypad: document.getElementById('keypad'),
    undoBtn: document.getElementById('undoBtn'),
    endTurnBtn: document.getElementById('endTurnBtn'),
    newGameBtn: document.getElementById('newGameBtn'),
    announcement: document.getElementById('announcement'),
    currentPlayerLabel: document.getElementById('currentPlayer'),
    frameLabel: document.getElementById('frameLabel'),
    dartLabel: document.getElementById('dartLabel'),
    modeLabel: document.getElementById('modeLabel'),
    alleyLabel: document.getElementById('alleyLabel'),
    scoreHead: document.getElementById('scoreHead'),
    scoreBody: document.getElementById('scoreBody'),
    historyList: document.getElementById('historyList'),
    leaderList: document.getElementById('leaderList'),
    exportHistoryBtn: document.getElementById('exportHistoryBtn'),
    importHistoryBtn: document.getElementById('importHistoryBtn'),
    importFile: document.getElementById('importFile')
  };

  function saveSnapshot(){
    historyStack.push(JSON.parse(JSON.stringify({
      players, totals, frameScores, roundScores, currentPlayer, frameIndex, dart, started
    })));
    if(historyStack.length > 200) historyStack.shift();
  }

  function updateMeta(){
    els.currentPlayerLabel.textContent = players[currentPlayer] || '—';
    els.frameLabel.textContent = `${frameIndex + 1} / 10`;
    els.dartLabel.textContent = `${dart} / 3`;
    els.modeLabel.textContent = 'Bowling Darts';
    els.alleyLabel.textContent = roundScores[currentPlayer][frameIndex][0] || '—';

    const selecting = dart === 1 && started && !isGameOver();
    Array.from(els.keypad.children).forEach(k => {
      k.disabled = !selecting;
      k.classList.toggle('disabled', !selecting);
    });

    const enableShots = dart > 1 && started && !isGameOver();
    Array.from(els.shotButtons.querySelectorAll('button')).forEach(b => {
      b.disabled = !enableShots;
      b.style.opacity = enableShots ? 1 : 0.4;
    });

    els.undoBtn.disabled = historyStack.length === 0;
  }

  function isGameOver(){
    return frameIndex >= 10;
  }

  function buildNumberGrid(){
    els.keypad.innerHTML = '';
    for(let i=1;i<=20;i++){
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = i;
      btn.title = `Select alley ${i}`;
      btn.addEventListener('click', () => {
        if(!started || isGameOver() || dart !== 1) return;
        saveSnapshot();
        selectAlley(i);
      });
      els.keypad.appendChild(btn);
    }
    const bull = document.createElement('button');
    bull.className = 'key bull';
    bull.textContent = 'Bull';
    bull.title = 'Bull';
    bull.addEventListener('click', () => {
      if(!started || isGameOver() || dart !== 1) return;
      saveSnapshot();
      selectAlley('Bull');
    });
    els.keypad.appendChild(bull);
  }

  function selectAlley(n){
    roundScores[currentPlayer][frameIndex][0] = n;
    dart = 2;
    setAnnouncement(`${players[currentPlayer]} selected alley ${n}. Now throw darts 2 & 3.`);
    updateMeta();
  }

  function handleShot(shotName){
    if(!started || isGameOver() || dart === 1) return;
    saveSnapshot();
    roundScores[currentPlayer][frameIndex][dart - 1] = shotName;
    if(dart === 2){
      dart = 3;
      setAnnouncement(`${players[currentPlayer]} threw ${shotName}. Final dart next.`);
    } else {
      finalizeFrame();
    }
    updateMeta();
  }

  function finalizeFrame(){
    const p = players[currentPlayer];
    const shots = roundScores[currentPlayer][frameIndex];
    const p2 = SHOT_PINS(shots[1]);
    const p3 = SHOT_PINS(shots[2]);
    let total = 0;
    if(p2 === 10 || p3 === 10) total = 10;
    else total = p2 + p3;
    if(total > 10) total = 10;
    frameScores[currentPlayer][frameIndex] = total;
    totals[currentPlayer] = frameScores[currentPlayer].reduce((a,b) => a + (b || 0), 0);
    dart = 1;
    currentPlayer++;
    if(currentPlayer >= players.length){
      currentPlayer = 0;
      frameIndex++;
    }
    if(isGameOver()){
      started = false;
      setAnnouncement(`Game over! Winner: ${winnerName()}`, 'good');
      saveMatch();
      renderHistory();
      renderLeaderboard();
    } else {
      setAnnouncement(`${players[currentPlayer]} to throw on frame ${frameIndex + 1}.`);
    }
    renderScoreboard();
    updateMeta();
  }

  function SHOT_PINS(shot){
    if(!shot) return 0;
    if(shot === 'Miss') return 0;
    if(shot === 'Double') return 10;
    if(shot === 'Triple') return 9;
    if(shot === 'Inner Single') return 7;
    if(shot === 'Outer Single') return 3;
    return 0;
  }

  function winnerName(){
    let min = Infinity;
    let winner = '';
    for(let i=0;i<players.length;i++){
      if(totals[i] < min){
        min = totals[i];
        winner = players[i];
      }
    }
    return winner;
  }

  function renderScoreboard(){
    els.scoreHead.innerHTML = '';
    els.scoreBody.innerHTML = '';
    const trHead = document.createElement('tr');
    trHead.innerHTML = `<th>Player</th>${Array.from({length:10},(_,i)=>`<th>F${i+1}</th>`).join('')}<th>Total</th>`;
    els.scoreHead.appendChild(trHead);
    players.forEach((p,i) => {
      const tr = document.createElement('tr');
      if(started && !isGameOver() && i === currentPlayer) tr.className = 'active-row';
      const tdName = document.createElement('td');
      tdName.className = 'name';
      tdName.textContent = p;
      tr.appendChild(tdName);
      for(let f=0;f<10;f++){
        const td = document.createElement('td');
        td.className = 'frame-cell';
        const shots = roundScores[i][f];
        if(shots){
          const alley = shots[0] || '-';
          const total = frameScores[i][f] || '';
          const topDiv = document.createElement('div');
          topDiv.className = 'frame-top';
          topDiv.innerHTML = `<span>${alley}</span><span>${total}</span>`;
          const throwsDiv = document.createElement('div');
          throwsDiv.className = 'throws';
          for(let d=1;d<=3;d++){
            const sp = throwSymbol(shots[d] || null);
            const span = document.createElement('span');
            span.className = 'throw';
            span.textContent = sp;
            throwsDiv.appendChild(span);
          }
          td.appendChild(topDiv);
          td.appendChild(throwsDiv);
        }
        tr.appendChild(td);
      }
      const tdTotal = document.createElement('td');
      tdTotal.className = 'total';
      tdTotal.textContent = totals[i] || 0;
      tr.appendChild(tdTotal);
      els.scoreBody.appendChild(tr);
    });
  }

  function setAnnouncement(msg, cls=''){
    els.announcement.textContent = msg;
    els.announcement.className = cls ? `announce ${cls}` : 'announce';
  }

  function saveMatch(){
    const history = loadFrom(STORAGE_HISTORY, []);
    const leaderboard = loadFrom(STORAGE_LEADER, {});
    const match = {
      id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
      date: document.getElementById('matchDate').value || (new Date()).toLocaleDateString(),
      players: players.map((p,i) => ({ name: p, total: totals[i] })),
      winner: winnerName()
    };
    history.unshift(match);
    saveTo(STORAGE_HISTORY, history);

    players.forEach((p,i) => {
      if(!leaderboard[p]) leaderboard[p] = { name: p, matches: 0, wins: 0, losses: 0, ties: 0, totalPoints: 0, totalFrames: 0, elo: 1200 };
      const rec = leaderboard[p];
      rec.matches++;
      rec.totalPoints += totals[i];
      rec.totalFrames += 10;
    });
    const winners = players.filter((p,i) => totals[i] === Math.min(...totals));
    players.forEach((p,i) => {
      const rec = leaderboard[p];
      if(winners.length > 1 && winners.includes(p)) rec.ties++;
      else if(winners.length === 1 && winners[0] === p) rec.wins++;
      else rec.losses++;
    });

    // Elo update pairwise
    applyElo(leaderboard, players.map((p,i) => ({ name: p, total: totals[i] })));

    saveTo(STORAGE_LEADER, leaderboard);
  }

  function applyElo(leaderboard, playerTotals){
    const k = 24;
    playerTotals.forEach(p => { if(!leaderboard[p.name]) leaderboard[p.name] = { name: p.name, matches:0, wins:0, losses:0, ties:0, totalPoints:0, totalFrames:0, elo:1200 }; });
    for(let i=0;i<playerTotals.length;i++){
      for(let j=i+1;j<playerTotals.length;j++){
        const A = leaderboard[playerTotals[i].name], B = leaderboard[playerTotals[j].name];
        const resA = playerTotals[i].total < playerTotals[j].total ? 1 : playerTotals[i].total === playerTotals[j].total ? 0.5 : 0;
        const ea = 1 / (1 + Math.pow(10, (B.elo - A.elo) / 400));
        const eb = 1 / (1 + Math.pow(10, (A.elo - B.elo) / 400));
        A.elo = Math.round(A.elo + k * (resA - ea));
        B.elo = Math.round(B.elo + k * ((1 - resA) - eb));
      }
    }
  }

  function renderHistory(){
    const hist = loadFrom(STORAGE_HISTORY, []);
    if(!hist.length) {
      els.historyList.innerHTML = '<div>No match history yet.</div>';
      return;
    }
    els.historyList.innerHTML = hist.slice(0,30).map(m => `
      <div style="padding:8px; border-bottom:1px solid var(--line);">
        <strong>${m.date}</strong> — ${m.players.map(p => `${p.name}: ${p.total}`).join(' • ')}<br/>
        Winner: <strong>${m.winner}</strong>
      </div>
    `).join('');
  }

  function renderLeaderboard(){
    const lb = loadFrom(STORAGE_LEADER, {});
    const rows = Object.values(lb).map(r => {
      return {
        ...r,
        avgRound: r.totalFrames ? (r.totalPoints / r.totalFrames) : 0,
        winPct: r.matches ? (r.wins / r.matches) * 100 : 0
      };
    }).sort((a,b) => b.elo - a.elo || b.wins - a.wins);
    if(!rows.length){
      els.leaderList.innerHTML = '<div>No leaderboard data yet.</div>';
      return;
    }
    els.leaderList.innerHTML = rows.map((r,i) => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--line);">
        <div><strong>#${i+1} ${r.name}</strong><br/><small>${r.matches} matches</small></div>
        <div style="text-align:center;">
          <div><strong>${r.elo}</strong></div>
          <div style="font-size:0.8rem;color:var(--muted)">${r.avgRound.toFixed(2)} avg/round</div>
        </div>
        <div style="text-align:center;">
          <div>W: ${r.wins}</div>
          <div>L: ${r.losses}</div>
          <div>T: ${r.ties}</div>
          <div>${r.winPct.toFixed(1)}%</div>
        </div>
      </div>
    `).join('');
  }

  function setAnn(msg, cls=''){
    els.announcement.textContent = msg;
    els.announcement.className = cls ? `announce ${cls}` : 'announce';
  }

  function saveTo(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function loadFrom(key, fallback){ try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }

  // Undo
  function undo(){
    if(!historyStack.length) { setAnn('Nothing to undo.'); return; }
    const prev = historyStack.pop();
    players = prev.players;
    totals = prev.totals;
    frameScores = prev.frameScores;
    roundScores = prev.roundScores;
    currentPlayer = prev.currentPlayer;
    frameIndex = prev.frameIndex;
    dart = prev.dart;
    started = prev.started;
    renderPlayerInputs();
    renderScoreboard();
    updateMeta();
    setAnn('Undone last action.');
  }

  // Event listeners
  els.addPlayerBtn.addEventListener('click', () => {
    players.push('Player ' + (players.length + 1));
    renderPlayerInputs();
  });
  els.removePlayerBtn.addEventListener('click', () => {
    if(players.length > 2) {
      players.pop();
      renderPlayerInputs();
    }
  });
  els.startBtn.addEventListener('click', () => {
    players = [...els.playersList.querySelectorAll('input')].map(i => i.value.trim() || 'Player');
    totals = Array(players.length).fill(0);
    frameScores = players.map(() => Array(10).fill(null));
    roundScores = players.map(() => Array.from({length:10}, () => [null,null,null]));
    currentPlayer = 0;
    frameIndex = 0;
    dart = 1;
    started = true;
    historyStack = [];
    setAnn(`Game started. ${players[0]} to select alley.`);
    renderScoreboard();
    updateMeta();
  });
  els.shotButtons.addEventListener('click', e => {
    const btn = e.target.closest('button[data-shot]');
    if(!btn) return;
    handleShot(btn.dataset.shot);
  });
  els.keypad.addEventListener('click', e => {
    const btn = e.target.closest('button.key:not(.disabled)');
    if(!btn) return;
    if(!started || dart !== 1) return;
    saveSnapshot();
    selectAlley(btn.textContent);
  });
  els.undoBtn.addEventListener('click', undo);
  els.endTurnBtn.addEventListener('click', () => {
    const p = players[currentPlayer];
    const f = roundScores[currentPlayer][frameIndex];
    if(!f[1] && !f[2]) { setAnn('Throw at least one dart before ending turn.', 'warn'); return; }
    saveSnapshot();
    if(!f[1]) f[1] = 'Miss';
    if(!f[2]) f[2] = 'Miss';
    finalizeFrame();
  });
  els.newGameBtn.addEventListener('click', () => {
    if(confirm('Start a new game? Current progress will be lost.')) {
      players = ['Player 1', 'Player 2'];
      totals = [];
      frameScores = [];
      roundScores = [];
      currentPlayer = 0;
      frameIndex = 0;
      dart = 1;
      started = false;
      historyStack = [];
      renderPlayerInputs();
      renderScoreboard();
      updateMeta();
      setAnn('Ready. Add players and start.');
    }
  });
  els.exportHistoryBtn.addEventListener('click', () => {
    const hist = loadFrom(STORAGE_HISTORY, []);
    const blob = new Blob([JSON.stringify(hist, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bowling-darts-history.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });
  els.importHistoryBtn.addEventListener('click', () => {
    document.getElementById('importFile').click();
  });
  document.getElementById('importFile').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error('Invalid file format');
        if(confirm('Replace current history with imported data?')) {
          saveTo(STORAGE_HISTORY, data);
          renderHistory();
          setAnn('History imported.');
        }
      } catch(err) {
        alert('Import failed: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // Initialize UI
  function renderPlayerInputs(){
    els.playersList.innerHTML = '';
    players.forEach((p,i) => {
      const div = document.createElement('div');
      div.className = 'player-row';
      const input = document.createElement('input');
      input.type = 'text';
      input.value = p;
      input.addEventListener('input', e => {
        players[i] = e.target.value;
        renderScoreboard();
      });
      div.appendChild(input);
      els.playersList.appendChild(div);
    });
    els.removePlayerBtn.disabled = players.length <= 2;
  }

  function handleShot(shot){
    if(!started || dart === 1 || isGameOver()) return;
    saveSnapshot();
    roundScores[currentPlayer][frameIndex][dart - 1] = shot;
    if(dart === 2){
      dart = 3;
      setAnn(`${players[currentPlayer]} threw ${shot}. Final dart next.`);
    } else {
      finalizeFrame();
    }
    updateMeta();
  }

  function finalizeFrame(){
    const p = players[currentPlayer];
    const shots = roundScores[currentPlayer][frameIndex];
    const p2 = pointsMap[shots[1]] || 0;
    const p3 = pointsMap[shots[2]] || 0;
    let total = 0;
    if(p2 === 10 || p3 === 10) total = 10;
    else total = p2 + p3;
    if(total > 10) total = 10;
    frameScores[currentPlayer][frameIndex] = total;
    totals[currentPlayer] = frameScores[currentPlayer].reduce((a,b) => a + (b || 0), 0);
    dart = 1;
    currentPlayer++;
    if(currentPlayer >= players.length){
      currentPlayer = 0;
      frameIndex++;
    }
    if(isGameOver()){
      started = false;
      setAnn(`Game over! Winner: ${winnerName()}`, 'good');
      saveMatch();
      renderHistory();
      renderLeaderboard();
    } else {
      setAnn(`${players[currentPlayer]} to throw on frame ${frameIndex + 1}.`);
    }
    renderScoreboard();
    updateMeta();
  }

  function winnerName(){
    let min = Infinity;
    let winner = '';
    for(let i=0;i<players.length;i++){
      if(totals[i] < min){
        min = totals[i];
        winner = players[i];
      }
    }
    return winner;
  }

  function renderScoreboard(){
    els.scoreHead.innerHTML = '';
    els.scoreBody.innerHTML = '';
    const trHead = document.createElement('tr');
    trHead.innerHTML = `<th>Player</th>${Array.from({length:10},(_,i)=>`<th>F${i+1}</th>`).join('')}<th>Total</th>`;
    els.scoreHead.appendChild(trHead);
    players.forEach((p,i) => {
      const tr = document.createElement('tr');
      if(started && !isGameOver() && i === currentPlayer) tr.className = 'active-row';
      const tdName = document.createElement('td');
      tdName.className = 'name';
      tdName.textContent = p;
      tr.appendChild(tdName);
      for(let f=0;f<10;f++){
        const td = document.createElement('td');
        td.className = 'frame-cell';
        const frame = players.length && frameScores.length ? frameScores[i][f] : null;
        const shots = roundScores[i] && roundScores[i][f] ? roundScores[i][f] : [];
        const topDiv = document.createElement('div');
        topDiv.className = 'frame-top';
        topDiv.innerHTML = `<span>${shots[0] || '-'}</span><span>${frame || ''}</span>`;
        const throwsDiv = document.createElement('div');
        throwsDiv.className = 'throws';
        for(let d=1;d<=3;d++){
          const sp = throwSymbol(shots[d] || null);
          const span = document.createElement('span');
          span.className = 'throw';
          span.textContent = sp;
          throwsDiv.appendChild(span);
        }
        td.appendChild(topDiv);
        td.appendChild(throwsDiv);
        tr.appendChild(td);
      }
      const tdTotal = document.createElement('td');
      tdTotal.className = 'total';
      tdTotal.textContent = totals[i] || 0;
      tr.appendChild(tdTotal);
      els.scoreBody.appendChild(tr);
    });
    updateMeta();
  }

  // Initialization
  players = ['Player 1', 'Player 2'];
  totals = [0,0];
  frameScores = [Array(10).fill(null), Array(10).fill(null)];
  roundScores = [Array.from({length:10}, ()=>[null,null,null]), Array.from({length:10}, ()=>[null,null,null])];
  renderPlayerInputs();
  buildNumberGrid();
  renderScoreboard();
  renderHistory();
  renderLeaderboard();
  setAnn('Enter player names and press Start.');
</script>
</body>
</html>
